services:
  # ChromaDB: Vector database for semantic search
  - type: pserv
    name: chroma
    runtime: image
    image:
      url: chromadb/chroma:0.5.23
    plan: free
    envVars:
      - key: ANONYMIZED_TELEMETRY
        value: "False"

  # FastAPI Backend: RAG agent + vector search
  - type: web
    name: ow2-rag-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: ./
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: CHROMA_HOST
        value: chroma
      - key: CHROMA_PORT
        value: "8000"
      - key: FRONTEND_ORIGIN
        value: https://ow2-rag-frontend.onrender.com
      - key: OPENAI_API_KEY
        sync: false

  # Next.js Frontend: React chat interface
  - type: web
    name: ow2-rag-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: ./
    plan: free
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://ow2-rag-backend.onrender.com
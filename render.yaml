services:
  - type: pserv
    name: chroma
    runtime: docker
    image: chromadb/chroma:0.5.23
    plan: standard
    disk:
      name: chroma-data
      mountPath: /chroma/chroma
      sizeGB: 10

  - type: web
    name: ow2-rag-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: ./
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: CHROMA_HOST
        value: chroma
      - key: CHROMA_PORT
        value: "8000"
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: ow2-rag-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: ./
    plan: standard
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://ow2-rag-backend.onrender.com
